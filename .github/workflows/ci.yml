name: CI

on:
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    checks:
        name: ${{ matrix.os }} checks
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os:
                    - ubuntu-latest
                    - windows-latest
                    - macos-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy,rustfmt

            - name: Cache Rust artifacts
              uses: Swatinem/rust-cache@v2

            - name: Set up Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Run workspace checks
              run: cargo run -p xtask -- ci
